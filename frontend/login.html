<!DOCTYPE html>
<html>
<head>
<title>Login - Flame VIP</title>
<style>background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
color: #f5f5f5;
body { background:#111; color:white; text-align:center; font-family:Arial; padding:50px; }
input { padding:10px; margin:10px; }
button { background:#ff2e63; border:none; padding:10px; color:white; cursor:pointer; }
</style>
</head>
<body>

<h2>Login</h2>

<input type="text" id="username" placeholder="Username"><br>
<input type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>

<script>
function login() {
  const user = document.getElementById("username").value;
  if(user.trim() === "") {
    alert("Enter a username");
    return;
  }
  localStorage.setItem("flamevip_user", user);
  window.location.href = "feed.html";
}
</script>

</body>
</html>
