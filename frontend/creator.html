<!DOCTYPE html>
<html>
<head>
<title>Creator Dashboard</title>

<style>
body{
margin:0;
background:#111;
color:white;
font-family:Arial;
padding:40px;
}

textarea{
width:100%;
padding:10px;
margin:10px 0;
}

button{
background:#ff2e63;
border:none;
padding:10px;
color:white;
cursor:pointer;
}

.post{
background:#1a1a1a;
padding:15px;
margin:15px 0;
border-radius:20px;
}
</style>

</head>

<body>

<h2>Creator Dashboard</h2>

<textarea id="postContent" placeholder="Write a new post..."></textarea>
<button onclick="addPost()">Post</button>

<h3>Posts From Server</h3>
<div id="postList"></div>

<script>

const token = localStorage.getItem("token");

if(!token){
alert("Please login first");
window.location.href="login.html";
}

async function addPost(){

const content=document.getElementById("postContent").value;

if(content.trim()=="") return;

await fetch("https://flamevip-backend.onrender.com/feed/create",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify({content})
});

document.getElementById("postContent").value="";

loadPosts();

}

async function loadPosts(){

const res = await fetch("https://flamevip-backend.onrender.com/feed",{
headers:{
"Authorization":"Bearer "+token
}
});

const posts = await res.json();

const list=document.getElementById("postList");

list.innerHTML="";

posts.forEach(p=>{
list.innerHTML+="<div class='post'><b>"+p.user+"</b><p>"+p.content+"</p></div>";
});

}

loadPosts();

</script>

</body>
</html>
