<!DOCTYPE html>
<html>
<head>
<title>Flame VIP Feed</title>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial, sans-serif;
  padding:30px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.actions{
  display:flex;
  gap:10px;
}

.post{
  background:#1a1a1a;
  padding:15px;
  margin:15px 0;
  border-radius:15px;
}

button{
  background:#ff2e63;
  border:none;
  padding:10px 14px;
  color:white;
  cursor:pointer;
  border-radius:10px;
}
</style>

</head>
<body>

<div class="topbar">
  <div>
    <h1>Flame VIP Feed</h1>
    <p id="welcome"></p>
  </div>

  <div class="actions">
    <button onclick="goCreator()">Creator Dashboard</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div id="feedPosts"></div>

<script>
const user = localStorage.getItem("flamevip_user");
const token = localStorage.getItem("token") || localStorage.getItem("flamevip_token");

if(!user || !token){
  window.location.href = "login.html";
}

document.getElementById("welcome").innerText = "Logged in as: " + user;

function goCreator(){
  window.location.href = "creator.html";
}

function logout(){
  localStorage.removeItem("flamevip_user");
  localStorage.removeItem("token");
  localStorage.removeItem("flamevip_token");
  window.location.href = "login.html";
}

async function loadFeed(){
  try{
    const res = await fetch("https://flamevip-backend.onrender.com/feed", {
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    const posts = await res.json();
    const feed = document.getElementById("feedPosts");
    feed.innerHTML = "";

    if(!Array.isArray(posts) || posts.length === 0){
      feed.innerHTML = "<div class='post'>No posts yet.</div>";
      return;
    }

    posts.forEach(p => {
      feed.innerHTML += "<div class='post'><b>" + p.user + "</b><p>" + p.content + "</p></div>";
    });
  } catch(err){
    document.getElementById("feedPosts").innerHTML = "<div class='post'>Could not load feed.</div>";
    console.error(err);
  }
}

loadFeed();
</script>

</body>
</html>
