<!DOCTYPE html>
<html>
<head>
  <title>FlameVIP Register</title>
  <style>
   body {
  background: #0d0d0f;
  font-family: 'Inter', sans-serif;
  color: #fff;
  padding: 40px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

h1 {
  font-size: 2rem;
  margin-bottom: 20px;
  background: linear-gradient(90deg, #ff4ecb, #ff8df2);
  -webkit-background-clip: text;
  color: transparent;
}

.auth-box {
  background: #1a1a1d;
  padding: 25px;
  border-radius: 12px;
  width: 100%;
  max-width: 350px;
  box-shadow: 0 0 20px rgba(255, 0, 150, 0.2);
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  background: #2a2a2d;
  color: #fff;
  font-size: 1rem;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(90deg, #ff4ecb, #ff8df2);
  color: #fff;
  font-size: 1rem;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.03);
  box-shadow: 0 0 12px rgba(255, 0, 150, 0.4);
}

a {
  color: #ff8df2;
  text-decoration: none;
  display: block;
  margin-top: 15px;
  text-align: center;
}

#error {
  color: #ff4ecb;
  margin-top: 10px;
  text-align: center;
}

  </style>
</head>
<body>

  <h1>🔥 Create Your FlameVIP Account</h1>

  <input id="username" placeholder="Choose a username">
  <input id="password" type="password" placeholder="Choose a password">

  <button onclick="registerUser()">Register</button>

  <p id="error" style="color:red;"></p>

  <script src="./register.js"></script>
</body>
</html>
