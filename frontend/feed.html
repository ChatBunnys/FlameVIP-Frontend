<!DOCTYPE html>
<html>
<head>
<title>Flame VIP Feed</title>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
  padding:30px;
}

.post{
  background:#1a1a1a;
  padding:15px;
  margin:15px 0;
  border-radius:15px;
}

button{
  background:#ff2e63;
  border:none;
  padding:10px;
  color:white;
  cursor:pointer;
}
</style>

</head>
<body>

<h1>Flame VIP Feed</h1>

<div id="feedPosts"></div>

<script>

const user = localStorage.getItem("flamevip_user");

if(!user){
window.location.href="login.html";
}

function loadFeed(){

let posts = JSON.parse(localStorage.getItem("creator_posts")) || [];

const feed = document.getElementById("feedPosts");

feed.innerHTML="";

posts.forEach(p=>{
feed.innerHTML += "<div class='post'>" + p + "</div>";
});

}

loadFeed();

</script>

</body>
</html>
