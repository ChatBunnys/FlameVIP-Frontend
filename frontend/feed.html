<!DOCTYPE html>
<html>
<head>
  <title>FlameVIP Feed</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    .post-card {
      background: #1a1a1d;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 0 15px rgba(255, 0, 150, 0.15);
    }

    .post-header {
      font-weight: bold;
      margin-bottom: 8px;
      color: #ff8df2;
    }

    .post-time {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-bottom: 10px;
    }

    .like-btn {
      background: linear-gradient(90deg, #ff4ecb, #ff8df2);
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      color: white;
      margin-top: 10px;
    }

    .comment-box {
      margin-top: 10px;
      display: flex;
      gap: 8px;
    }

    .comment-box input {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      border: none;
      background: #2a2a2d;
      color: white;
    }

    .comment {
      margin-top: 8px;
      padding-left: 10px;
      border-left: 2px solid #ff4ecb;
    }
  </style>
</head>

<body>

  <h1>🔥 FlameVIP Feed</h1>

  <div>
    <textarea id="newPost" placeholder="Share something..." style="width:100%;height:80px;background:#1a1a1d;color:white;border:none;border-radius:10px;padding:10px;"></textarea>
   <input type="file" id="mediaUpload" style="margin-top:10px;">
   <button class="like-btn" onclick="createPost()">Post</button>
  </div>

  <hr style="margin:25px 0; border-color:#333;">

  <div id="feed"></div>

  <script src="./feed.js"></script>
</body>
</html>
