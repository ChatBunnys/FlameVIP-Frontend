<!DOCTYPE html>
<html>
<head>
  <title>Login - Flame VIP</title>
  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
      color: #f5f5f5;
      text-align: center;
      font-family: Arial, sans-serif;
      padding: 50px;
    }

    input {
      padding: 10px;
      margin: 10px;
      width: 250px;
      border: none;
      border-radius: 8px;
    }

    button {
      background: #ff2e63;
      border: none;
      padding: 10px 20px;
      color: white;
      cursor: pointer;
      border-radius: 8px;
    }

    a {
      color: #ff2e63;
    }
  </style>
</head>
<body>

  <h2>Login</h2>

  <input type="text" id="username" placeholder="Username"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>

  <p><a href="register.html">Create an account</a></p>

  <script>
    async function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!username || !password) {
        alert("Enter username and password");
        return;
      }

      try {
        const response = await fetch("https://flamevip-backend.onrender.com/auth/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (!response.ok) {
          alert(data.message || "Login failed");
          return;
        }

        localStorage.setItem("flamevip_user", username);

        if (data.token) {
          localStorage.setItem("token", data.token);
          localStorage.setItem("flamevip_token", data.token);
        }

        alert("Login successful");
        window.location.href = "frontend/feed.html";
      } catch (error) {
        alert("Server error during login");
        console.error(error);
      }
    }
  </script>

</body>
</html>
